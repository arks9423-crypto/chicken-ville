<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غير متصل - QRMenu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cairo', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #FFFBEB; color: #1C1917; padding: 1.5rem; text-align: center; direction: rtl; }
    .container { max-width: 400px; }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: .75rem; color: #92400E; }
    p { color: #78716C; margin-bottom: 2rem; line-height: 1.7; }
    button { background: #F59E0B; color: #fff; border: none; padding: .85rem 2rem; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    button:hover { background: #D97706; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📱</div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>تحقق من اتصالك بالإنترنت ثم حاول مجدداً.</p>
    <button onclick="window.location.reload()">إعادة المحاولة</button>
  </div>
</body>
</html>

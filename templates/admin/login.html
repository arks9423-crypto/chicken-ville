<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>* { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-900 to-gray-700">

<div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4">
  <div class="text-center mb-8">
    <div class="w-16 h-16 rounded-full mx-auto flex items-center justify-center text-2xl font-bold text-white mb-4"
         style="background: #E85D04">
      🍽️
    </div>
    <h1 class="text-2xl font-bold text-gray-800">لوحة التحكم</h1>
    <p class="text-gray-500 text-sm mt-1">سجّل دخولك للمتابعة</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for cat, msg in messages %}
        <div class="mb-4 px-4 py-3 rounded-lg text-sm font-medium bg-red-100 text-red-700">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-4">
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">اسم المستخدم</label>
      <input type="text" name="username" required
             class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400"
             placeholder="admin">
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">كلمة المرور</label>
      <input type="password" name="password" required
             class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400"
             placeholder="••••••••">
    </div>
    <button type="submit"
            class="w-full py-3 rounded-xl text-white font-bold text-base mt-2"
            style="background: #E85D04">
      تسجيل الدخول
    </button>
  </form>
</div>

</body>
</html>
